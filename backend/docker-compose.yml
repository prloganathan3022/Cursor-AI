services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskapp
      POSTGRES_PASSWORD: taskapp
      POSTGRES_DB: taskapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://taskapp:taskapp@db:5432/taskapp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery worker --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://taskapp:taskapp@db:5432/taskapp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt}
    depends_on:
      - db
      - redis

  # Periodic jobs (example): celery -A celery_worker.celery beat --loglevel=info
  # beat:
  #   build: { context: ., dockerfile: Dockerfile }
  #   command: celery -A celery_worker.celery beat --loglevel=info
  #   environment: { ...same as worker... }
  #   depends_on: [db, redis]

volumes:
  pgdata:
