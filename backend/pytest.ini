[pytest]
testpaths = tests
pythonpath = .
markers =
    unit: Isolated unit tests (no HTTP client).
    integration: Tests that use the Flask test client and database.
addopts =
    -ra
    --strict-markers
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing:skip-covered
    --cov-fail-under=90
